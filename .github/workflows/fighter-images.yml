name: Fighter Image Backfill

on:
  schedule:
    - cron: '30 3 * * *'  # Run daily at 3:30 AM UTC (after scraper at 2:00 AM)
  workflow_dispatch:
    inputs:
      limit:
        description: 'Maximum fighters to process (default: 50)'
        required: false
        type: string
        default: '50'

jobs:
  backfill-images:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scraper/requirements.txt'

      - name: Install Python dependencies
        working-directory: ./scraper
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backfill fighter images
        working-directory: ./scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          python scripts/backfill_fighter_images.py --limit "${LIMIT:-50}"

      - name: Check on failure
        if: failure()
        run: |
          echo "❌ Fighter image backfill failed."
          echo "Common issues:"
          echo "  - DATABASE_URL secret not set or invalid"
          echo "  - ESPN/Wikipedia API rate limiting"
