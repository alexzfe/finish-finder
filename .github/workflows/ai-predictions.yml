name: AI Predictions Generator

on:
  schedule:
    - cron: '30 4 * * *'  # Run daily at 4:30 AM UTC (after scraper at 2:00 AM)
  workflow_dispatch:        # Allow manual trigger

jobs:
  generate-predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run AI predictions generator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Running hybrid judgment predictions..."
          npx ts-node scripts/generate-hybrid-predictions-all.ts

      - name: Check AI predictions health (if failed)
        if: failure()
        run: |
          echo "❌ AI predictions failed. Check logs above for details."
          echo ""
          echo "Common issues:"
          echo "  - OpenAI API rate limits or missing OPENAI_API_KEY secret"
          echo "  - Database connection issues (DATABASE_URL)"
          echo "  - Invalid fight data"